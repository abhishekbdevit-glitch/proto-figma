<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DIGI-PHARMed Admin Portal</title>
<style>
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f9f8f5;
  --border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1916;--text2:#5a5850;--text3:#8a877e;
  --accent:#1a4f8a;--accent-lt:#e8f0fa;--accent-md:#c5d8f5;
  --green:#1b6b42;--green-lt:#e8f5ee;
  --amber:#7a4d00;--amber-lt:#fef3da;
  --red:#911111;--red-lt:#fef0f0;
  --purple:#4a3aaf;--purple-lt:#f0eeff;
  --teal:#0f6e56;--teal-lt:#e1f5ee;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;
  --sidebar:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;line-height:1.6;color:var(--text);background:var(--bg);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Layout ── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.page-wrap{flex:1;overflow-y:auto;padding:24px 28px}

/* ── Sidebar ── */
.logo-area{padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-box{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.logo-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.logo-tag{font-size:10px;color:var(--text3);margin-top:1px}
.role-badge{margin:10px 18px 0;padding:7px 12px;background:var(--accent-lt);border:1px solid var(--accent-md);border-radius:var(--radius-sm);font-size:11px}
.role-badge .role-who{font-weight:700;color:var(--accent)}
.role-badge .role-title{color:var(--text3);font-size:10px;margin-top:1px}
.nav-group{padding:4px 0;border-bottom:1px solid var(--border)}
.nav-group:last-child{border-bottom:none}

/* ── Group header (clickable, collapses/expands items) ── */
.nav-group-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 18px 9px 16px;
  cursor:pointer;user-select:none;
  transition:background .12s;
}
.nav-group-hdr:hover{background:var(--surface2)}
.nav-group-hdr-left{display:flex;align-items:center;gap:7px}
.nav-group-hdr-icon{font-size:13px;width:16px;text-align:center;opacity:.7;flex-shrink:0}
.nav-group-hdr-label{
  font-size:11px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--text3);
}
.nav-group-hdr.has-active .nav-group-hdr-label{color:var(--accent)}
.nav-group-chevron{
  font-size:9px;color:var(--text3);
  transition:transform .2s ease;flex-shrink:0;
}
.nav-group-chevron.open{transform:rotate(180deg)}
.nav-group-badge{
  font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;
  background:var(--red);color:#fff;margin-left:4px;
}
.nav-group-badge.amber{background:var(--amber-lt);color:var(--amber)}

/* ── Items container — collapses smoothly ── */
.nav-items{
  overflow:hidden;
  max-height:0;
  transition:max-height .22s ease;
}
.nav-items.open{max-height:400px}

/* ── Individual nav items ── */
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 18px 7px 34px; /* extra left indent under group */
  cursor:pointer;font-size:12.5px;color:var(--text2);
  border-left:2px solid transparent;
  transition:all .12s;user-select:none;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{
  background:var(--accent-lt);color:var(--accent);
  border-left-color:var(--accent);font-weight:600;
}
.nav-icon{font-size:12px;width:14px;text-align:center;flex-shrink:0;opacity:.7}
.nav-badge{margin-left:auto;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--red);color:#fff}
.nav-badge.green{background:var(--green-lt);color:var(--green)}
.nav-badge.amber{background:var(--amber-lt);color:var(--amber)}

/* ── Topbar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px}
.topbar-left{display:flex;flex-direction:column;gap:1px}
.page-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.breadcrumb{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.breadcrumb span{color:var(--text2)}
.bc-sep{color:var(--border2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 12px;width:280px}
.search-box input{border:none;background:transparent;font-size:12.5px;color:var(--text);font-family:var(--font);outline:none;flex:1}
.search-box input::placeholder{color:var(--text3)}
.topbar-btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--font)}
.topbar-btn.ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.topbar-btn.ghost:hover{background:var(--surface2);color:var(--text)}
.topbar-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-btn.primary:hover{background:#163f72}
.notif-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--surface)}

/* ── Shared primitives ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#163f72}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-success{background:var(--green-lt);color:var(--green);border-color:#a8d4b8}
.btn-success:hover{background:var(--green);color:#fff}
.btn-danger{background:var(--red-lt);color:var(--red);border-color:#f5b8b8}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-warn{background:var(--amber-lt);color:var(--amber);border-color:#f5dcb0}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10.5px}

.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-amber{background:var(--amber-lt);color:var(--amber)}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-blue{background:var(--accent-lt);color:var(--accent)}
.badge-purple{background:var(--purple-lt);color:var(--purple)}
.badge-teal{background:var(--teal-lt);color:var(--teal)}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

.age-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.age-ok{background:var(--green-lt);color:var(--green)}
.age-warn{background:var(--amber-lt);color:var(--amber)}
.age-crit{background:var(--red-lt);color:var(--red)}

.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-green{background:var(--green)}.dot-amber{background:var(--amber)}.dot-red{background:var(--red)}.dot-blue{background:var(--accent)}

/* ── KPI strip ── */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;flex-direction:column;gap:6px}
.kpi-top{display:flex;align-items:center;justify-content:space-between}
.kpi-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.kpi-delta{font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:20px}
.kpi-delta.up{background:var(--green-lt);color:var(--green)}
.kpi-delta.down{background:var(--red-lt);color:var(--red)}
.kpi-delta.neutral{background:var(--surface2);color:var(--text3)}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1}
.kpi-lbl{font-size:11px;color:var(--text3);font-weight:500}
.kpi-sub{font-size:10.5px;color:var(--text3)}

/* ── Panel grid ── */
.panel-row{display:grid;gap:16px;margin-bottom:16px}
.panel-row-3{grid-template-columns:repeat(3,1fr)}
.panel-row-2{grid-template-columns:2fr 1fr}
.panel-row-4{grid-template-columns:repeat(4,1fr)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.panel-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.panel-body{padding:0}
.panel-scroll{max-height:280px;overflow-y:auto}

/* ── Tables ── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:8px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.data-table td{padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafaf8}
.data-table tr.row-crit td{background:#fff9f9}

.entity-name{font-weight:600;color:var(--text);font-size:13px}
.entity-sub{font-size:10.5px;color:var(--text3);margin-top:1px;font-family:var(--mono)}
.action-btns{display:flex;gap:5px;align-items:center}

/* ── Approval queue item ── */
.approval-item{padding:10px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.approval-item:last-child{border-bottom:none}
.approval-item:hover{background:var(--surface2)}
.ai-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ai-name{font-size:12.5px;font-weight:600;color:var(--text);flex:1}
.ai-body{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ai-meta{font-size:11px;color:var(--text3)}
.ai-actions{display:flex;gap:4px}

/* ── Alert item ── */
.alert-item{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.alert-item:last-child{border-bottom:none}
.alert-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.alert-body{flex:1}
.alert-title{font-size:12px;font-weight:600;color:var(--text)}
.alert-desc{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.alert-time{font-size:10px;color:var(--text3);white-space:nowrap;margin-top:2px}

/* ── Heatmap ── */
.heatmap-grid{display:grid;grid-template-columns:140px repeat(5,1fr);gap:1px;padding:12px;background:var(--border)}
.hm-cell{background:var(--surface);padding:8px;font-size:11px;text-align:center}
.hm-label{background:var(--surface);padding:8px;font-size:11px;font-weight:600;color:var(--text2);text-align:right}
.hm-header{background:var(--surface2);padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);text-align:center}
.hm-val{display:inline-flex;align-items:center;justify-content:center;width:36px;height:22px;border-radius:4px;font-size:11px;font-weight:700}
.hm-90{background:#c6e9d4;color:#1b6b42}
.hm-70{background:#fef3da;color:#7a4d00}
.hm-50{background:#fde8c8;color:#913b00}
.hm-30{background:#fef0f0;color:#911111}

/* ── Pipeline funnel ── */
.funnel{display:flex;flex-direction:column;gap:3px;padding:12px 14px}
.funnel-row{display:flex;align-items:center;gap:10px}
.funnel-label{font-size:11.5px;color:var(--text2);width:110px;flex-shrink:0}
.funnel-bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:18px;overflow:hidden;position:relative}
.funnel-bar{height:100%;border-radius:3px;transition:width .3s}
.funnel-count{font-size:11px;font-weight:700;color:var(--text);width:30px;text-align:right;flex-shrink:0}
.funnel-pct{font-size:10px;color:var(--text3);width:30px;text-align:right;flex-shrink:0}

/* ── Inspector pool ── */
.inspector-stat{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px}
.inspector-stat:last-child{border-bottom:none}
.inspector-stat-label{color:var(--text2)}
.inspector-stat-val{font-weight:700;font-family:var(--mono);color:var(--text)}

/* ── Finance panel ── */
.finance-bar{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.fee-row{display:flex;align-items:center;gap:10px}
.fee-course{font-size:11.5px;color:var(--text2);width:80px;flex-shrink:0}
.fee-bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:14px;overflow:hidden}
.fee-bar{height:100%;background:var(--accent);border-radius:3px}
.fee-amt{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;font-family:var(--mono)}
.fee-pct{font-size:10px;color:var(--text3);width:36px;text-align:right}

/* ── Quick actions ── */
.quick-actions{display:flex;flex-direction:column;gap:5px;padding:10px}
.qa-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);background:var(--surface2);transition:all .12s;font-size:12.5px;color:var(--text2)}
.qa-item:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent-md)}
.qa-icon{font-size:14px;width:16px;text-align:center}

/* ── Module pages ── */
.module-page{max-width:1400px}
.page-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .12s;font-family:var(--font)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-chip:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.spacer{flex:1}

.card-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.ct-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.ct-title{font-size:13px;font-weight:700;color:var(--text)}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-.8px;color:var(--text);margin-bottom:3px}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:500}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.form-input{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface2);transition:border-color .15s;width:100%}
.form-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
select.form-input{cursor:pointer}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px}
.form-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.reg-strip{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;display:flex;gap:10px;font-size:11.5px;color:var(--text2);line-height:1.5}

.timeline{display:flex;flex-direction:column;gap:0;padding:12px 14px}
.tl-item{display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;position:relative}
.tl-item::before{content:'';position:absolute;left:10px;top:22px;bottom:0;width:1px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1}
.tl-dot-green{background:var(--green-lt);color:var(--green);border:2px solid var(--green)}
.tl-dot-amber{background:var(--amber-lt);color:var(--amber);border:2px solid var(--amber)}
.tl-dot-red{background:var(--red-lt);color:var(--red);border:2px solid var(--red)}
.tl-dot-gray{background:var(--surface2);color:var(--text3);border:2px solid var(--border2)}
.tl-body{flex:1}
.tl-title{font-size:12.5px;font-weight:600;color:var(--text)}
.tl-meta{font-size:11px;color:var(--text3);margin-top:2px}

.grievance-item{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:24px 1fr 80px 90px 80px;gap:10px;align-items:center;transition:background .1s}
.grievance-item:hover{background:var(--surface2)}
.grievance-item:last-child{border-bottom:none}

.sla-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sla-fill{height:100%;border-radius:3px}

/* ── Role switcher ── */
.role-switcher{display:flex;gap:5px;padding:10px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.role-chip{padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:600;border:1px solid var(--border2);cursor:pointer;transition:all .12s;font-family:var(--font)}
.role-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.role-chip:hover:not(.active){background:var(--accent-lt);color:var(--accent)}

/* ── Misc ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.section-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:13px;font-weight:700;color:var(--text)}
.section-sub{font-size:11px;color:var(--text3);margin-top:1px}
.section-body{padding:14px 16px}
.empty-state{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px}
.divider-h{height:1px;background:var(--border);margin:12px 0}
.flex-row{display:flex;align-items:center;gap:8px}
.mono{font-family:var(--mono);font-size:11.5px}
</style>
</head>
<body>
<div class="shell">

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="logo-area">
    <div class="logo-row">
      <div class="logo-box">DP</div>
      <div>
        <div class="logo-name">DIGI-PHARMed</div>
        <div class="logo-tag">Pharmacy Council of India</div>
      </div>
    </div>
  </div>

  <!-- Role switcher -->
  <div class="role-switcher">
    <div class="role-chip active" onclick="switchRole('registrar',this)">Registrar</div>
    <div class="role-chip" onclick="switchRole('inspector',this)">Inspector</div>
    <div class="role-chip" onclick="switchRole('accounts',this)">Accounts</div>

const GROUP_META = {

  'Operations':   { icon:'⚙️' },

  'Config':       { icon:'🔧' },
};

const openGroups = new Set(['Governance']);

function getGroupForPage(page) {
  for (const g of NAV_GROUPS) {
    if (g.items.some(i => i.id === page)) return g.label;
  }
  return null;
}

function toggleGroup(label) {
  if (openGroups.has(label)) openGroups.delete(label);
  else openGroups.add(label);
  renderNav();
}

function renderNav() {
  const allowed = ROLES[currentRole].modules;
  const activeGroup = getGroupForPage(currentPage);
  if (activeGroup) openGroups.add(activeGroup);
  const root = document.getElementById('nav-root');
  root.innerHTML = NAV_GROUPS.map(g => {
    const items = g.items.filter(i => allowed.includes(i.id));
    if (!items.length) return '';
    const isOpen    = openGroups.has(g.label);
    const hasActive = items.some(i => i.id === currentPage);
    const meta      = GROUP_META[g.label] || { icon:'📁' };
    const totalRed  = items.filter(i=>i.badge&&i.badgeCls==='red').reduce((s,i)=>s+(parseInt(i.badge)||0),0);
    const totalAmb  = items.filter(i=>i.badge&&i.badgeCls==='amber').reduce((s,i)=>s+(parseInt(i.badge)||0),0);
    const badgeHtml = totalRed>0 ? `<span class="nav-group-badge">${totalRed}</span>`
                    : totalAmb>0 ? `<span class="nav-group-badge amber">${totalAmb}</span>` : '';
    const itemsHtml = items.map(i => `
      <div class="nav-item${currentPage===i.id?' active':''}" onclick="nav('${i.id}')">
        <span class="nav-icon">${i.icon}</span>${i.label}
        ${i.badge?`<span class="nav-badge ${i.badgeCls||''}">${i.badge}</span>`:''}
      </div>`).join('');
    return `
      <div class="nav-group">
        <div class="nav-group-hdr${hasActive?' has-active':''}" onclick="toggleGroup('${g.label}')">
          <div class="nav-group-hdr-left">
            <span class="nav-group-hdr-icon">${meta.icon}</span>
            <span class="nav-group-hdr-label">${g.label}</span>
            ${badgeHtml}
          </div>
          <span class="nav-group-chevron${isOpen?' open':''}">▼</span>
        </div>
        <div class="nav-items${isOpen?' open':''}">
          ${itemsHtml}
        </div>
      </div>`;
  }).join('');
}

function nav(page) {
  currentPage = page;
  renderNav();
  const meta = PAGE_META[page] || { title: page, crumb: page };
  document.getElementById('page-title').textContent = meta.title;
  document.getElementById('page-crumb').textContent  = meta.crumb;
  document.getElementById('page-content').innerHTML  = renderPage(page);
}

function switchRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-chip').forEach(c=>c.classList.remove('active'));

}

// ════════════════════════════════════════════════════════
// COMPONENT HELPERS
// ════════════════════════════════════════════════════════
function kpi(icon, label, val, sub, delta, bg) {
  const cls = delta==='up'?'up':delta==='down'?'down':'neutral';
  const arrow = delta==='up'?'↑ ':'↓ ';
  return `<div class="kpi-card">
    <div class="kpi-top">
      <div class="kpi-icon" style="background:${bg}">${icon}</div>
      <span class="kpi-delta ${cls}">${sub}</span>
    </div>

    <td class="mono" style="font-size:12px">${insts}</td>
    <td><span class="badge badge-green">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Edit</button></div></td>
  </tr>`;
}

function eaRow(name, state, courses, insts, exam, results, deficiencies) {
  const defCls = deficiencies > 0 ? 'badge-red' : 'badge-green';
  const resCls = results === 'Yes' ? 'badge-green' : results === 'Pending' ? 'badge-amber' : 'badge-gray';
  return `<tr>
    <td><div class="entity-name">${name}</div></td>
    <td style="font-size:12px">${state}</td>
    <td style="font-size:11.5px">${courses}</td>
    <td class="mono">${insts}</td>
    <td style="font-size:12px">${exam}</td>
    <td><span class="badge ${resCls}">${results}</span></td>
    <td><span class="badge ${defCls}">${deficiencies > 0 ? deficiencies + ' open' : 'None'}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Review</button></div></td>
  </tr>`;
}

function appealRow(id, ea, decision, date, status) {
  const stCls = status === 'Resolved' ? 'badge-green' : status === 'PCI Response Sent' ? 'badge-blue' : 'badge-amber';
  return `<tr>
    <td class="mono" style="font-size:11px">${id}</td>
    <td style="font-size:12px;font-weight:600">${ea}</td>
    <td style="font-size:12px">${decision}</td>
    <td style="font-size:12px">${date}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Respond</button></div></td>
  </tr>`;
}

function resultRow(ea, exam, course, submitted, status, cls='') {
  const stCls = status.includes('Verified') ? 'badge-green' : status.includes('Verification') ? 'badge-amber' : 'badge-red';
  return `<tr style="${cls === 'amber' ? 'background:#fffcf0' : ''}">
    <td style="font-size:12px;font-weight:600">${ea}</td>
    <td style="font-size:12px">${exam}</td>
    <td><span class="badge badge-blue">${course}</span></td>
    <td style="font-size:12px">${submitted}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Process</button></div></td>
  </tr>`;
}

function inspDetailRow2(name, type, course, inspector, observer, date, status, deficiencies, cls='') {
  const stCls = status === 'Unassigned' ? 'badge-red' : status === 'Completed' ? 'badge-green' : status === 'Report Due' ? 'badge-red' : 'badge-amber';
  const defDisplay = deficiencies === '-' ? '<span style="color:var(--text3)">—</span>' : deficiencies === 'Overdue' ? '<span class="badge badge-red">Overdue</span>' : deficiencies.includes('raised') ? `<span class="badge badge-amber">${deficiencies}</span>` : '<span style="color:var(--text3)">—</span>';
  return `<tr style="${cls === 'crit' ? 'background:#fff9f9;' : ''}">
    <td><div class="entity-name">${name}</div></td>
    <td><span class="badge badge-blue">${type}</span></td>
    <td style="font-size:12px">${course}</td>
    <td style="font-size:12px">${inspector === 'Unassigned' ? '<span class="badge badge-red">Unassigned</span>' : inspector}</td>
    <td style="font-size:12px">${observer}</td>
    <td style="font-size:11.5px">${date}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td>${defDisplay}</td>
    <td><div class="action-btns">
      <button class="btn btn-ghost btn-xs">View</button>
      ${inspector === 'Unassigned' ? '<button class="btn btn-primary btn-xs">Assign</button>' : '<button class="btn btn-ghost btn-xs">Report</button>'}
    </div></td>
  </tr>`;
}

function deficiencyRow(inst, desc, raised, response, status) {
  const stCls = status.includes('Verified') ? 'badge-green' : status.includes('Review') ? 'badge-amber' : 'badge-gray';
  return `<tr>
    <td style="font-size:12px;font-weight:600">${inst}</td>
    <td style="font-size:12px;max-width:200px">${desc}</td>
    <td style="font-size:11.5px">${raised}</td>
    <td style="font-size:11.5px">${response}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Verify</button></div></td>
  </tr>`;
}

function inspectorRow2(name, qual, spec, zone, done, rating, quality, timeliness, status, cls='') {
  const stCls = status === 'Pending Approval' ? 'badge-amber' : status === 'On Leave' ? 'badge-gray' : status === 'On Assignment' ? 'badge-blue' : 'badge-green';
  return `<tr>
    <td><div class="entity-name">${name}</div></td>
    <td style="font-size:11px">${qual}</td>
    <td style="font-size:11.5px">${spec}</td>
    <td><span class="badge badge-blue">${zone}</span></td>
    <td class="mono">${done}</td>
    <td><span class="badge badge-green">★ ${rating}</span></td>
    <td><span class="badge ${quality === 'Excellent' ? 'badge-green' : quality === 'Good' ? 'badge-teal' : 'badge-amber'}">${quality}</span></td>
    <td class="mono" style="font-size:12px">${timeliness}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns">
      <button class="btn btn-ghost btn-xs">Profile</button>
      ${status === 'Pending Approval' ? '<button class="btn btn-success btn-xs">Approve</button>' : '<button class="btn btn-ghost btn-xs">Assign</button>'}
    </div></td>
  </tr>`;
}

function infraRow2(name, state, labs, classrooms, computers, facilities, comp, photos) {
  const cls = comp >= 90 ? 'badge-green' : comp >= 70 ? 'badge-amber' : 'badge-red';
  const photoCls = photos === 'Approved' ? 'badge-green' : photos === 'All approved' ? 'badge-green' : photos.includes('rejected') ? 'badge-red' : 'badge-amber';
  return `<tr style="${comp < 65 ? 'background:#fff9f9;' : ''}">
    <td><div class="entity-name">${name}</div></td>
    <td style="font-size:12px">${state}</td>
    <td style="font-size:12px">${labs}</td>
    <td style="font-size:12px">${classrooms}</td>
    <td><span class="badge ${computers === 'Yes' ? 'badge-green' : 'badge-red'}">${computers}</span></td>
    <td><span class="badge ${facilities === 'Adequate' ? 'badge-green' : facilities === 'Partial' ? 'badge-amber' : 'badge-red'}">${facilities}</span></td>
    <td><span class="badge ${cls}">${comp}%</span></td>
    <td><span class="badge ${photoCls}">${photos}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Validate</button></div></td>
  </tr>`;
}

function hospitalRow(name, type, state, beds, accred, insts, mouTill, staffStatus, cls='') {
  const stCls = cls === 'amber' ? 'badge-amber' : 'badge-green';
  return `<tr style="${cls === 'amber' ? 'background:#fffcf0;' : ''}">
    <td><div class="entity-name">${name}</div></td>
    <td style="font-size:12px">${type}</td>
    <td style="font-size:12px">${state}</td>
    <td class="mono">${beds}</td>
    <td style="font-size:12px">${accred}</td>
    <td class="mono">${insts}</td>
    <td style="font-size:12px">${mouTill}</td>
    <td><span class="badge ${stCls}">${staffStatus}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Edit</button></div></td>
  </tr>`;
}

function equipRow(name, state, course, required, submitted, gaps, photos, status) {
  const stCls = status === 'Compliant' ? 'badge-green' : status.includes('Partial') ? 'badge-amber' : 'badge-red';
  return `<tr style="${gaps > 10 ? 'background:#fff9f9;' : ''}">
    <td><div class="entity-name">${name}</div></td>
    <td style="font-size:12px">${state}</td>
    <td><span class="badge badge-blue">${course}</span></td>
    <td class="mono">${required}</td>
    <td class="mono">${submitted}</td>
    <td><span class="badge ${gaps > 0 ? 'badge-red' : 'badge-green'}">${gaps > 0 ? gaps + ' gaps' : 'None'}</span></td>
    <td style="font-size:12px">${photos}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Validate</button></div></td>
  </tr>`;
}

function libraryRow(name, state, titles, journals, seating, digital, comp, inspSync, cls='') {
  const compCls = comp >= 90 ? 'badge-green' : comp >= 70 ? 'badge-amber' : 'badge-red';
  return `<tr style="${cls === 'amber' ? 'background:#fffcf0;' : ''}">
    <td><div class="entity-name">${name}</div></td>
    <td style="font-size:12px">${state}</td>
    <td style="font-size:12px">${titles}</td>
    <td style="font-size:12px">${journals}</td>
    <td style="font-size:12px">${seating}</td>
    <td><span class="badge ${digital === 'Yes' ? 'badge-green' : 'badge-amber'}">${digital}</span></td>
    <td><span class="badge ${compCls}">${comp}%</span></td>
    <td><span class="badge ${inspSync === 'Synced' ? 'badge-green' : 'badge-amber'}">${inspSync}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Validate</button></div></td>
  </tr>`;
}

function employerRow(name, type, states, jobs, apps, verified, status, cls='') {
  const stCls = cls === 'amber' ? 'badge-amber' : 'badge-green';
  return `<tr style="${cls === 'amber' ? 'background:#fffcf0;' : ''}">
    <td><div class="entity-name">${name}</div></td>
    <td><span class="badge badge-purple">${type}</span></td>
    <td style="font-size:12px">${states}</td>
    <td class="mono">${jobs}</td>
    <td class="mono">${apps}</td>
    <td><span class="badge ${verified === 'Yes' ? 'badge-green' : 'badge-amber'}">${verified}</span></td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Moderate</button></div></td>
  </tr>`;
}

function reconRow(txn, name, gateway, ledger, diff, date, status, cls='') {
  const stCls = cls === 'crit' ? 'badge-red' : cls === 'amber' ? 'badge-amber' : 'badge-green';
  return `<tr style="${cls === 'crit' ? 'background:#fff9f9;' : ''}">
    <td class="mono" style="font-size:11px">${txn}</td>
    <td style="font-size:12px;font-weight:600">${name}</td>
    <td class="mono">${gateway}</td>
    <td class="mono">${ledger}</td>
    <td class="mono" style="${diff !== '—' ? 'color:var(--red);font-weight:700' : 'color:var(--text3)'}">${diff}</td>
    <td style="font-size:12px">${date}</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button>${cls === 'crit' ? '<button class="btn btn-warn btn-xs">Fix</button>' : ''}</div></td>
  </tr>`;
}

function ieRow(label, amount, type) {
  const col = type === 'Income' ? 'var(--green)' : 'var(--red)';
  const sign = type === 'Income' ? '+' : '−';
  return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
    <span style="color:var(--text2)">${label}</span>
    <span style="font-family:var(--mono);font-weight:600;color:${col}">${sign} ${amount}</span>
  </div>`;
}

function budgetRow(dept, alloc, spent, pct) {
  return `<div style="margin-bottom:9px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span style="color:var(--text2)">${dept}</span>
      <span style="font-family:var(--mono);color:var(--text);font-weight:600">${spent} / ${alloc}</span>
    </div>
    <div style="background:var(--surface2);border-radius:3px;height:6px"><div style="height:100%;border-radius:3px;background:var(--accent);width:${pct}%"></div></div>
  </div>`;
}

function reportRow(title, desc, ref) {
  return `<div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
    <div>
      <div style="font-size:12.5px;font-weight:600;color:var(--text)">${title} <span class="badge badge-gray" style="font-size:9px">${ref}</span></div>
      <div style="font-size:11px;color:var(--text3);margin-top:1px">${desc}</div>
    </div>
    <div style="display:flex;gap:5px;flex-shrink:0;margin-left:12px">
      <button class="btn btn-ghost btn-xs">Preview</button>
      <button class="btn btn-primary btn-xs">Export</button>
    </div>
  </div>`;
}

function masterRow(name, desc) {
  return `<div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
    <div><div style="font-size:12.5px;font-weight:600;color:var(--text)">${name}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${desc}</div></div>
    <div style="display:flex;gap:5px"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Edit</button></div>
  </div>`;
}

function pendingMasterRow(type, change, by, status) {
  const stCls = status === 'Approved' ? 'badge-green' : status.includes('DS') ? 'badge-amber' : 'badge-amber';
  return `<div style="padding:10px 14px;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:12px;font-weight:600;color:var(--text)">${type}</span>
      <span class="badge ${stCls}">${status}</span>
    </div>
    <div style="font-size:11.5px;color:var(--text2)">${change}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:3px">By ${by}</div>
    ${status !== 'Approved' ? `<div style="display:flex;gap:5px;margin-top:6px"><button class="btn btn-success btn-xs">Approve</button><button class="btn btn-danger btn-xs">Reject</button></div>` : ''}
  </div>`;
}

function alertConfigRow(event, timing, channels, status) {
  return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:12px;font-weight:600;color:var(--text)">${event}</div>
      <div style="font-size:10.5px;color:var(--text3);margin-top:1px">${timing} · ${channels}</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="badge badge-green">${status}</span>
      <button class="btn btn-ghost btn-xs">Configure</button>
    </div>
  </div>`;
}

function trendRow(metric, y1, y2, y3) {
  return `<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
    <div style="font-weight:600;color:var(--text);margin-bottom:3px">${metric}</div>
    <div style="display:flex;gap:12px;color:var(--text3)"><span>${y1}</span><span>→ ${y2}</span><span style="color:var(--green);font-weight:600">→ ${y3}</span></div>
  </div>`;
}

function permRow(module, reg, scrut, verif, accts, it) {
  const pCell = (v) => {
    const cls = v === 'Full' ? 'badge-green' : v === 'None' ? 'badge-gray' : 'badge-blue';
    return `<td><span class="badge ${cls}" style="font-size:10px">${v}</span></td>`;
  };
  return `<tr><td style="font-size:12px;font-weight:600;color:var(--text)">${module}</td>${pCell(reg)}${pCell(scrut)}${pCell(verif)}${pCell(accts)}${pCell(it)}</tr>`;
}

function grievDetailRow(id, cat, inst, desc, age, sla, status, cls='') {
  const slaPct = Math.min(100, Math.round((age / sla) * 100));
  const stCls  = status === 'Resolved' ? 'badge-green' : status === 'Escalated' ? 'badge-red' : 'badge-amber';
  const barColor = cls === 'crit' ? 'var(--red)' : cls === 'warn' ? 'var(--amber)' : 'var(--green)';
  return `<tr style="${cls === 'crit' ? 'background:#fff9f9;' : ''}">
    <td class="mono" style="font-size:11px">${id}</td>
    <td><span class="badge badge-blue">${cat}</span></td>
    <td style="font-size:12px">${inst}</td>
    <td style="font-size:12px;max-width:180px">${desc}</td>
    <td><span class="badge ${age <= 2 ? 'badge-red' : age <= 5 ? 'badge-amber' : 'badge-gray'}">${age <= 2 ? 'High' : age <= 5 ? 'Med' : 'Low'}</span></td>
    <td class="mono" style="font-size:12px">${age}d</td>
    <td><div style="font-size:10px;color:var(--text3);margin-bottom:3px">${sla}h SLA</div><div class="sla-bar" style="width:80px"><div class="sla-fill" style="width:${slaPct}%;background:${barColor}"></div></div></td>
    <td style="font-size:12px">Assigned</td>
    <td><span class="badge ${stCls}">${status}</span></td>
    <td><div class="action-btns"><button class="btn btn-ghost btn-xs">View</button><button class="btn btn-primary btn-xs">Respond</button></div></td>
  </tr>`;
}

// INIT

renderNav();
nav('dashboard');

// Live search hint
document.getElementById('global-search').addEventListener('input', function() {
  if (this.value.length > 2) this.style.borderColor = 'var(--accent)';
  else this.style.borderColor = '';
});
</script>
</body>
